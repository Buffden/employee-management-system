services:
  postgres:
    image: postgres:18-alpine
    container_name: ems-postgres

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "2"

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PWD}
      PGDATA: /var/lib/postgresql/data
      # DB_NAME, DB_USER, DB_PWD are exported as shell env vars in deploy.yml (never written to disk)

    # No port exposure - only accessible from backend container via ems-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - ems-network

    restart: unless-stopped

  backend:
    image: buffden/ems-backend:${IMAGE_TAG}
    container_name: ems-backend

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    # Secrets are fetched directly from SSM Parameter Store by Spring Cloud AWS at startup.
    # Only non-secret runtime config is passed here.
    environment:
      SPRING_PROFILES_ACTIVE: prod
      AWS_REGION: us-east-1
      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - ems-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 300s

  redis:
    image: redis:7-alpine
    container_name: ems-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "2"
    volumes:
      - redis_data:/data
    networks:
      - ems-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  gateway:
    image: buffden/ems-gateway:${IMAGE_TAG}
    container_name: ems-gateway

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - ems-network

    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
    name: ems_postgres_data

networks:
  ems-network:
    driver: bridge
