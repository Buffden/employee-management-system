# Static Nginx Configuration for Production
# HTTP redirects to HTTPS, HTTPS serves content
# SSL certificates handled by Certbot

upstream backend {
    server backend:8080;
}

# Timing log format for request and upstream timing
log_format timed '$remote_addr - $request $status $request_time $upstream_response_time';

# Rate Limiting Zones
# 10MB zone can track ~160K unique IPs
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;      # Auth endpoints: 10 req/min
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;       # General API: 20 req/sec
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;                 # Connection tracking

# Return 429 (not nginx default 503) when rate/conn limits are exceeded
limit_req_status 429;
limit_conn_status 429;

# IP Blocklist - known scanner/bot IPs
# Add IPs here and reload nginx: docker exec ems-gateway nginx -s reload
geo $blocked_ip {
    default         0;
    84.247.182.240  1;  
    37.60.234.175   1;  
    217.76.205.162  1;  
    194.233.94.97   1;  
    185.207.251.4   1;  
    141.98.154.52   1;  
}

# HTTP Server - Redirects to HTTPS (except for Let's Encrypt ACME challenge)
server {
    listen 80;
    server_name ems.buffden.com;
    
    # Let's Encrypt ACME challenge - must be on port 80
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name ems.buffden.com;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log timed;

    # Block known malicious IPs immediately (before any processing)
    if ($blocked_ip) {
        return 444;  # nginx "no response" - drops connection silently, no egress
    }

    # Global Connection Limits
    limit_conn conn_limit 10;                    # Max 10 concurrent connections per IP
    client_max_body_size 10m;                    # Max request body size: 10MB
    client_body_timeout 30s;                     # Request body timeout
    client_header_timeout 30s;                   # Request header timeout

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/ems.buffden.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ems.buffden.com/privkey.pem;
    
    # Modern SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA256';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';" always;
    # HSTS - Only for HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    # Auth Endpoints - Stricter Rate Limits (must come before /api block)
    location ~ ^/api/auth/(login|register|forgot-password|reset-password|activate) {
        # 10 requests per minute per IP, burst of 5 (queue excess)
        limit_req zone=auth_limit burst=5 nodelay;
        limit_conn conn_limit 5;

        # CORS headers for API responses
        add_header 'Access-Control-Allow-Origin' "https://$server_name" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Requested-With,Accept,Origin,Cache-Control' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        add_header 'Vary' 'Origin' always;

        # Handle OPTIONS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "https://$server_name" always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Requested-With,Accept,Origin,Cache-Control' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        error_page 429 = @rate_limit_error;
    }

    # API Gateway routes - proxy to backend (preserve /api prefix)
    location /api {
        # 20 requests per second per IP, burst of 15
        limit_req zone=api_limit burst=15 nodelay;
        limit_conn conn_limit 5;

        # CORS headers for API responses
        add_header 'Access-Control-Allow-Origin' "https://$server_name" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Requested-With,Accept,Origin,Cache-Control' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        add_header 'Vary' 'Origin' always;

        # Handle OPTIONS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "https://$server_name" always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,X-Requested-With,Accept,Origin,Cache-Control' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }

        # Proxy to backend preserving full path
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        error_page 429 = @rate_limit_error;
    }

    # Rate Limit Error Handler
    location @rate_limit_error {
        default_type application/json;
        add_header 'Access-Control-Allow-Origin' "https://$server_name" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        return 429 '{"status":429,"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later."}';
    }

    # Health check endpoint
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # Serve Angular app - SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
