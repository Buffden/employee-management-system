# Production Profile Configuration
# This file contains production-specific settings that override application.properties

# Fetch all secrets from SSM Parameter Store at startup
# Maps /ems/prod/DB_HOST -> Spring property DB_HOST, etc.
spring.config.import=aws-parameterstore:/ems/prod/
spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.parameterstore.enabled=true

# Production Database Configuration - Require SSL
# Override default SSL mode to require SSL for production
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSL_MODE:require}&connectTimeout=30

# Production: Use Flyway for schema changes and disable Hibernate auto-DDL
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=none

# Production: Hide health check details for security
management.endpoint.health.show-details=never

# Production Logging - Disable SQL logging for performance and security
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Production: Use generic error messages (no internal details)
app.error.show-details=false

# Production: Disable demo mode (never return invite/reset tokens in responses)
app.demo-mode=false

# Production: Secure auth cookies
app.cookies.secure=true
app.cookies.same-site=Strict

# Production: Suppress auth tokens in responses for browser clients
app.auth.suppress-tokens-for-browser=true

# Production: Admin user creation controlled by ADMIN_CREATE environment variable
# Set ADMIN_CREATE=true in .env.production to enable admin user creation
# Set ADMIN_USERNAME and ADMIN_PASSWORD in .env.production for admin credentials
app.admin.create=${ADMIN_CREATE:true}
app.admin.username=${ADMIN_USERNAME:}
app.admin.password=${ADMIN_PASSWORD:}
app.admin.email=${ADMIN_EMAIL:ems.buffden@gmail.com}

# Redis Configuration (for Rate Limiting)
# Production: Redis required for distributed rate limiting
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
