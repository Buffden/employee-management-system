<div class="container">
  <!-- Filter Section -->
  <div class="filter-section">
    <div class="filter-card">
      <h3 class="filter-title">Filters</h3>
      
      <div class="filter-controls">
        <!-- Filter Field Selector -->
        <div class="filter-control-group">
          <label for="filterField">Filter by:</label>
          <select 
            id="filterField"
            [(ngModel)]="selectedFilterField"
            (change)="onFilterFieldChange()"
            class="filter-select">
            <option value="">-- Select a field --</option>
            <option *ngFor="let field of getAvailableFilterFields()" [value]="field">
              {{ field | titlecase }}
            </option>
          </select>
        </div>

        <!-- Filter Operator Selector -->
        <div class="filter-control-group" *ngIf="selectedFilterField">
          <label for="filterOperator">Operator:</label>
          <select 
            id="filterOperator"
            [(ngModel)]="selectedFilterOperator"
            class="filter-select">
            <option *ngFor="let op of getAvailableOperators()" [value]="op">
              {{ op | titlecase }}
            </option>
          </select>
        </div>

        <!-- Filter Values Selector -->
        <div class="filter-control-group" *ngIf="selectedFilterField && filters[selectedFilterField]">
          <label>Values:</label>
          <div class="filter-values">
            <div *ngFor="let option of filters[selectedFilterField]" class="filter-value-item">
              <input 
                type="checkbox"
                [id]="'filter-' + option.label"
                [checked]="isFilterValueSelected(option.label)"
                (change)="toggleFilterValue(option.label)"
                class="filter-checkbox">
              <label [for]="'filter-' + option.label" class="filter-value-label">
                {{ option.label }}
              </label>
            </div>
          </div>
        </div>

        <!-- Filter Action Buttons -->
        <div class="filter-actions">
          <button 
            (click)="applyFilter()"
            [disabled]="!selectedFilterField || selectedFilterValues.length === 0"
            class="btn btn-primary">
            Apply Filter
          </button>
          <button 
            *ngIf="hasActiveFilters()"
            (click)="clearFilters()"
            class="btn btn-secondary">
            Clear Filters
          </button>
        </div>

        <!-- Active Filters Display -->
        <div *ngIf="hasActiveFilters()" class="active-filters">
          <span class="active-filter-label">Active Filters:</span>
          <div class="filter-chips-container">
            <span *ngFor="let filter of activeFilters" 
                  [ngClass]="getFilterChipColorClass(filter.field)"
                  class="active-filter-tag">
              <span class="chip-label">{{ getFilterLabels(filter.values).join(', ') }}</span>
              <button (click)="removeFilter(filter.field)" class="close-filter" title="Remove filter">×</button>
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Table Section -->
  <app-table 
    [inputData]="tableData" 
    [tableConfig]="tableConfig"
    [totalElements]="totalElements"
    [useBackendPagination]="true"
    [currentPageIndex]="currentPage"
    [pageSize]="pageSize"
    [loading]="loading"
    [linkClickHandler]="onDepartmentNameClick"
    [editActionHandler]="onEditAction"
    [deleteActionHandler]="onDeleteAction"
    [returnToPage]="'departments'"
    [filters]="filters"
    (sortChange)="onSortChange($event)"
    (pageChange)="onPageChange($event)">
  </app-table>
</div>
